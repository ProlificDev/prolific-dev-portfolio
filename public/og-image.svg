<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Blue glow orb left -->
  <circle cx="150" cy="315" r="300" fill="#0066ff" opacity="0.08"/>
  <!-- Blue glow orb right -->
  <circle cx="1050" cy="315" r="250" fill="#0066ff" opacity="0.06"/>

  <!-- Logo mark — outer dashed ring -->
  <circle cx="600" cy="220" r="72"
    stroke="#0066ff" stroke-width="3"
    stroke-dasharray="12 8" stroke-linecap="round"
    fill="none" opacity="0.5"/>
  <!-- Logo mark — solid circle -->
  <circle cx="600" cy="220" r="56" fill="#0066ff"/>
  <!-- P lettermark -->
  <text x="600" y="244"
    text-anchor="middle"
    fill="white"
    font-size="58"
    font-weight="900"
    font-family="Inter, Arial Black, sans-serif">P</text>

  <!-- Wordmark -->
  <text x="600" y="340"
    text-anchor="middle"
    fill="white"
    font-size="52"
    font-weight="900"
    font-family="Inter, Arial Black, sans-serif">Prolific<tspan fill="#0066ff">Dev</tspan></text>

  <!-- Tagline -->
  <text x="600" y="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.4)"
    font-size="22"
    font-weight="500"
    font-family="Inter, Arial, sans-serif">Emmanuel Awuzie · Frontend Developer</text>

  <!-- Bottom accent bar -->
  <rect x="520" y="460" width="160" height="4" rx="2" fill="#0066ff" opacity="0.6"/>
</svg>
